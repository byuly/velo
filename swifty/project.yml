name: Velo
options:
  bundleIdPrefix: app.velo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: app.velo.ios
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Velo/Info.plist
    DEVELOPMENT_TEAM: ""

targets:
  Velo:
    type: application
    platform: iOS
    sources:
      - path: Velo
        excludes:
          - "**/*.md"
      - path: VeloApp.swift
    info:
      path: Velo/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Velo needs camera access to record your day clips."
        NSMicrophoneUsageDescription: "Velo needs microphone access to record audio in your clips."
        NSPhotoLibraryAddUsageDescription: "Velo needs access to save reels to your camera roll."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - velo
            CFBundleURLName: app.velo
